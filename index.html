<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="robots" content="noindex, nofollow">
<title>VAM Garage · Costos & Rentabilidad</title>
<style>
  :root{
    --bg:#050505; --bg2:#0c0c0c; --bg3:#131313; --border:#1e1e1e;
    --text:#f0f0f0; --muted:#666; --muted2:#999; --accent:#e8178a;
    --green:#27c76f; --yellow:#f0a500; --red:#e04040; --silver:#8a8a8a;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  body{background:var(--bg);color:var(--text);font-family:system-ui,-apple-system,sans-serif;
    font-size:14px;line-height:1.4;padding-bottom:40px;}
  /* HEADER */
  header{border-top:3px solid var(--accent);background:var(--bg2);padding:16px 20px;
    display:flex;align-items:center;justify-content:space-between;gap:12px;position:sticky;top:0;z-index:20;
    border-bottom:1px solid var(--border);}
  .brand{display:flex;align-items:center;gap:12px;}
  .mark{width:30px;height:30px;flex:0 0 auto;}
  .logo{font-size:13px;letter-spacing:5px;font-weight:700;text-transform:uppercase;}
  .logo small{display:block;font-size:8px;letter-spacing:2px;color:var(--muted);font-weight:500;margin-top:3px;}
  .sync{display:flex;flex-direction:column;align-items:flex-end;gap:6px;}
  .btn-sync{background:var(--bg3);border:1px solid var(--border);color:var(--text);
    padding:10px 14px;border-radius:8px;font-size:11px;cursor:pointer;display:flex;align-items:center;gap:6px;
    text-transform:uppercase;letter-spacing:1px;
    transition:background .15s ease,border-color .15s ease,transform .07s ease;}
  .btn-sync:hover{border-color:var(--accent);color:#fff;}
  .btn-sync:focus-visible{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px rgba(232,23,138,.35);}
  .btn-sync:active{background:var(--accent);border-color:var(--accent);transform:scale(0.97);}
  .stamp{font-size:9px;color:var(--muted);letter-spacing:.5px;}
  .dot{width:7px;height:7px;border-radius:50%;background:var(--muted);display:inline-block;}
  .dot.ok{background:var(--green);} .dot.err{background:var(--red);} .dot.load{background:var(--yellow);}
  /* TABS */
  nav{display:flex;gap:0;overflow-x:auto;background:var(--bg2);border-bottom:1px solid var(--border);
    position:sticky;top:64px;z-index:19;-webkit-overflow-scrolling:touch;}
  nav button{background:none;border:none;color:var(--muted2);padding:14px 16px;font-size:10px;
    text-transform:uppercase;letter-spacing:1.5px;cursor:pointer;white-space:nowrap;border-bottom:2px solid transparent;font-weight:600;
    transition:color .15s ease,border-color .15s ease;}
  nav button:hover{color:var(--text);}
  nav button:focus-visible{outline:none;color:var(--text);box-shadow:inset 0 -2px 0 var(--accent);}
  nav button.active{color:var(--text);border-bottom-color:var(--accent);}
  /* CONTENT */
  main{padding:20px;max-width:1100px;margin:0 auto;}
  .view{display:none;} .view.active{display:block;animation:viewIn .22s ease-out;}
  @keyframes viewIn{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:none;}}
  h2.section{font-size:11px;text-transform:uppercase;letter-spacing:2px;color:var(--muted2);
    margin:24px 0 12px;font-weight:600;}
  h2.section:first-child{margin-top:0;}
  /* KPI cards */
  .kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;}
  .kpi{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:16px;}
  .kpi .k-label{font-size:9px;text-transform:uppercase;letter-spacing:1.5px;color:var(--muted);margin-bottom:8px;}
  .kpi .k-value{font-size:26px;font-weight:700;}
  .kpi .k-sub{font-size:10px;color:var(--muted2);margin-top:4px;}
  /* service cards */
  .cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:14px;}
  .card{background:var(--bg2);border:1px solid var(--border);border-radius:12px;overflow:hidden;transition:border-color .2s ease;}
  .card:hover{border-color:#2e2e2e;}
  .card-head{padding:14px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;gap:8px;}
  .card-head .name{font-size:14px;font-weight:700;}
  .badge{font-size:9px;font-weight:700;padding:4px 8px;border-radius:20px;text-transform:uppercase;letter-spacing:1px;white-space:nowrap;}
  .badge.ok{background:rgba(39,199,111,.15);color:var(--green);}
  .badge.warn{background:rgba(240,165,0,.15);color:var(--yellow);}
  .badge.bad{background:rgba(224,64,64,.15);color:var(--red);}
  .card-body{padding:14px 16px;}
  .row{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--bg3);font-size:13px;}
  .row:last-child{border-bottom:none;}
  .row .lbl{color:var(--muted2);} .row .val{font-weight:600;}
  .row.total{margin-top:6px;padding-top:10px;border-top:1px solid var(--border);border-bottom:none;}
  .row.total .lbl{color:var(--text);font-weight:600;}
  .pos{color:var(--green);} .neg{color:var(--red);} .acc{color:var(--accent);}
  .bar{height:6px;background:var(--bg3);border-radius:4px;margin-top:12px;overflow:hidden;}
  .bar i{display:block;height:100%;border-radius:4px;transform-origin:left;animation:barIn .3s ease-out;}
  @keyframes barIn{from{transform:scaleX(0);}to{transform:scaleX(1);}}
  /* cost breakdown */
  .cost-row{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--bg3);font-size:13px;}
  .cost-row .cost-label{color:var(--muted2);}
  .cap{font-size:10px;color:var(--muted);margin:-2px 0 4px;}
  .detail-toggle{margin-top:12px;font-size:10px;text-transform:uppercase;letter-spacing:1px;color:var(--accent);cursor:pointer;user-select:none;transition:opacity .15s ease;}
  .detail-toggle:hover{opacity:.7;}
  .detail{margin-top:8px;background:var(--bg3);border-radius:8px;padding:10px 12px;}
  .det-h{font-size:9px;text-transform:uppercase;letter-spacing:1.5px;color:var(--muted);margin:8px 0 4px;font-weight:700;}
  .det-h:first-child{margin-top:0;}
  .mat-item{display:flex;justify-content:space-between;padding:3px 0;font-size:11px;color:var(--muted2);}
  /* price cards + vehicle grid */
  .cards-sm{display:grid;grid-template-columns:repeat(auto-fill,minmax(255px,1fr));gap:12px;}
  .pcard{padding:13px 14px;}
  .pcard-name{font-size:13px;font-weight:700;margin-bottom:2px;}
  .vpg{display:grid;grid-template-columns:repeat(4,1fr);gap:4px;margin-top:8px;}
  .vpc{background:var(--bg3);border:1px solid var(--border);border-radius:6px;padding:6px 2px;text-align:center;overflow:hidden;}
  .vpc.active{border-top:2px solid var(--accent);background:#0f0508;}
  .vpc-lbl{font-size:8px;font-weight:700;text-transform:uppercase;letter-spacing:0;color:var(--muted);margin-bottom:3px;}
  .vpc-lbl.hl{color:var(--accent);}
  .vpc-val{font-size:12px;font-weight:700;white-space:nowrap;}
  .vpc-val.hl{color:var(--accent);font-weight:800;}
  .vpc-gan{font-size:11px;font-weight:800;margin-top:3px;}
  .vpc-mg{font-size:8px;opacity:.8;margin-top:1px;}
  .badge.cat{background:transparent;border:1px solid var(--green);color:var(--green);}
  .sug{display:flex;justify-content:space-between;align-items:flex-end;margin-top:12px;padding-top:10px;border-top:1px solid var(--border);}
  .sug .s-lbl{font-size:8px;text-transform:uppercase;letter-spacing:1px;color:var(--muted);}
  .sug .s-val{font-size:18px;font-weight:800;color:var(--green);}
  .mgline{display:flex;justify-content:space-between;font-size:10px;margin-top:6px;}
  /* table */
  .tbl-wrap{overflow-x:auto;border:1px solid var(--border);border-radius:10px;}
  table{width:100%;border-collapse:collapse;font-size:13px;min-width:380px;}
  th{background:var(--bg2);text-align:left;padding:11px 12px;font-size:9px;text-transform:uppercase;
    letter-spacing:1px;color:var(--muted2);border-bottom:1px solid var(--border);white-space:nowrap;}
  th.num,td.num{text-align:right;}
  td{padding:11px 12px;border-bottom:1px solid var(--bg3);}
  tr:last-child td{border-bottom:none;}
  tr.sub td{background:var(--bg3);font-size:9px;text-transform:uppercase;letter-spacing:1.5px;color:var(--accent);font-weight:700;padding:8px 12px;}
  td .mini{color:var(--muted);font-size:11px;}
  /* states */
  .loading,.error{text-align:center;padding:50px 20px;color:var(--muted2);}
  .error{color:var(--red);}
  .error a{color:var(--accent);}
  .spinner{width:34px;height:34px;border:3px solid var(--border);border-top-color:var(--accent);
    border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 16px;}
  @keyframes spin{to{transform:rotate(360deg);}}
  .note{font-size:11px;color:var(--muted);background:var(--bg2);border:1px solid var(--border);
    border-radius:8px;padding:10px 12px;margin-bottom:16px;}
  .note.cache{border-color:var(--yellow);color:var(--yellow);}
  @media(max-width:520px){
    main{padding:16px;} .kpi .k-value{font-size:22px;}
    nav{top:62px;}
  }
  @media(prefers-reduced-motion:reduce){
    *,*::before,*::after{animation-duration:.001ms!important;animation-iteration-count:1!important;transition-duration:.001ms!important;}
  }
</style>
</head>
<body>
<header>
  <div class="brand">
    <svg class="mark" viewBox="0 0 40 40" fill="none"><path d="M20 2L37 11v18L20 38 3 29V11L20 2z" stroke="#e8178a" stroke-width="2"/><path d="M20 11l9 5v8l-9 5-9-5v-8l9-5z" fill="#e8178a" opacity=".25"/><path d="M20 11l9 5v8l-9 5-9-5v-8l9-5z" stroke="#e8178a" stroke-width="1.5"/></svg>
    <div class="logo">V A M&nbsp;&nbsp;G A R A G E<small>Costos &amp; Rentabilidad</small></div>
  </div>
  <div class="sync">
    <button class="btn-sync" id="refresh">↻ Actualizar</button>
    <span class="stamp"><span class="dot" id="dot"></span> <span id="stamp">—</span></span>
  </div>
</header>

<nav id="nav">
  <button data-v="resumen" class="active">Resumen</button>
  <button data-v="rentab">Rentabilidad</button>
  <button data-v="precios">Precios</button>
  <button data-v="insumos">Insumos</button>
  <button data-v="margenes">Márgenes</button>
</nav>

<main id="main">
  <div class="loading" id="loading"><div class="spinner"></div>Cargando datos de tu Google Sheet…</div>
  <div class="view" id="v-resumen"></div>
  <div class="view" id="v-rentab"></div>
  <div class="view" id="v-precios"></div>
  <div class="view" id="v-insumos"></div>
  <div class="view" id="v-margenes"></div>
</main>

<script>
const SHEET_ID='1UqaOw2jmD24uN8avQisEeKCfYgDPEMtrLIHYhHXXpU0';
const SHEET_URL='https://docs.google.com/spreadsheets/d/'+SHEET_ID;
const TABS={
  insumos:741779892, precios:131451656, margenes:1352505801, costeo:777960188
};
const CACHE_KEY='vam_sheet_cache_v1';
const csvUrl=g=>SHEET_URL+'/gviz/tq?tqx=out:csv&gid='+g+'&t='+Date.now();

/* ---------- helpers ---------- */
function num(s){ if(s==null)return 0; s=String(s).replace(/[$,\s%]/g,''); const v=parseFloat(s); return isNaN(v)?0:v; }
function money(n){ return '$'+Math.round(n).toLocaleString('en-US'); }
function parseCSV(text){
  const rows=[];let row=[],cur='',q=false;
  for(let i=0;i<text.length;i++){const c=text[i];
    if(q){ if(c==='"'){ if(text[i+1]==='"'){cur+='"';i++;} else q=false; } else cur+=c; }
    else{ if(c==='"')q=true; else if(c===','){row.push(cur);cur='';}
      else if(c==='\n'){row.push(cur);rows.push(row);row=[];cur='';}
      else if(c==='\r'){} else cur+=c; }
  }
  if(cur!==''||row.length){row.push(cur);rows.push(row);}
  return rows;
}
const T=(r,i)=>((r[i]||'').trim());

/* ---------- parsers ---------- */
function parseInsumos(rows){
  const out=[];
  for(const r of rows){
    const name=T(r,1);
    if(!name||name==='Nombre del Producto')continue;
    const costo=num(r[2]),ml=num(r[3]),costoDil=num(r[5]);
    if(costo===0 && costoDil===0){ out.push({section:name}); continue; }
    out.push({name,costo,ml,ocupar:num(r[4]),costoDil,dur:T(r,6)});
  }
  return out;
}
function parsePrecios(rows){
  const out=[];
  for(const r of rows){
    const name=T(r,1);
    if(!name||name==='Servicio')continue;
    const c=T(r,2),m=T(r,3),s=T(r,4),f=T(r,5);
    if(!c&&!m&&!s&&!f){ out.push({section:name}); continue; }
    out.push({name,compacto:c,mediano:m,suv:s,filas:f});
  }
  return out;
}
function parseMargenes(rows){
  const out=[];
  for(const r of rows){
    const t=T(r,2);
    if(!t||t==='Tipo de servicio')continue;
    out.push({tipo:t,ideal:T(r,3),min:T(r,4)});
  }
  return out;
}
function parseDesglose(rows){
  let costoMO=0,costoMat=0,factor=1,calcular=0,utilidad=0,precio=0,precioServ=0;
  const labor=[],mats=[];
  for(const r of rows){
    const l7=T(r,7), l14=T(r,14), l2=T(r,2);
    if(l7==='Costo mano de obra:') costoMO=num(r[11]);
    if(l7==='Precio Servicio:')   precioServ=num(r[11]);
    if(l14==='Costo materiales/equipo:') costoMat=num(r[17]);
    if(l2==='FACTOR DE AJUSTE') factor=num(r[3])||1;
    if(l2==='CALCULAR')         calcular=num(r[3]);
    if(l2==='UTILIDAD')         utilidad=num(r[3]);
    if(l2==='PRECIO')           precio=num(r[3]);
    if(l7 && l7!=='Rol' && !l7.includes(':') && T(r,8)==='TRUE' && num(r[11])>0)
      labor.push({name:l7,rate:num(r[9]),hours:num(r[10]),total:num(r[11])});
    if(l14 && l14!=='Rol' && !l14.includes(':') && num(r[17])>0)
      mats.push({name:l14,unit:num(r[15]),qty:num(r[16]),total:num(r[17])});
  }
  const costoTotal=costoMO+costoMat;
  const margen= precio>0 ? (precio-costoTotal)/precio*100 : 0;
  return {costoMO,costoMat,costoTotal,factor,calcular,utilidad,precio,precioServ,labor,mats,margen};
}
function pricePct(s){ const p=/%/.test(s||''); const v=num(s); return p? v/100 : v; }
function parseCosteo(rows){
  const out=[];
  for(const r of rows){
    const name=T(r,0);
    if(!name||/^VAM GARAGE/i.test(name)||/^NOTA/i.test(name))continue;
    const tipo=T(r,1), costoTotal=num(r[6]), precio=pricePct(r[7]);
    if(!tipo && costoTotal===0)continue;   // fila de seccion (CERAMICOS / SERVICIOS NORMALES)
    const margen=precio>0?(precio-costoTotal)/precio*100:0;
    out.push({name,cat:tipo,personas:T(r,2),tiempo:T(r,3),costoMO:num(r[4]),costoMat:num(r[5]),costoTotal,precio,margen,notas:T(r,9)});
  }
  return out;
}

/* ---------- fetch ---------- */
async function fetchTab(gid){
  const res=await fetch(csvUrl(gid),{cache:'no-store'});
  if(!res.ok) throw new Error('HTTP '+res.status);
  const txt=await res.text();
  if(/<html|<!DOCTYPE/i.test(txt.slice(0,200))) throw new Error('no-public');
  return parseCSV(txt);
}
async function loadAll(){
  const data={};
  data.insumos=parseInsumos(await fetchTab(TABS.insumos));
  data.precios=parsePrecios(await fetchTab(TABS.precios));
  data.margenes=parseMargenes(await fetchTab(TABS.margenes));
  data.costeo=parseCosteo(await fetchTab(TABS.costeo));
  return data;
}

/* ---------- render ---------- */
const CTGT={'Cerámico':60,'Pulido':50,'Interior':35,'Adicionales':40,'Paquetes':45};
function catGroup(tipo){const n=norm(tipo);
  if(/ceramic/.test(n))return'Cerámico';
  if(/pulido|correc/.test(n))return'Pulido';
  if(/interior|vestidura/.test(n))return'Interior';
  if(/paquete/.test(n))return'Paquetes';
  return'Adicionales';}
function tgtOf(s){return CTGT[catGroup(s.cat)]||40;}
function estado(s){const tgt=tgtOf(s);
  if(s.margen>=tgt) return {cls:'ok',txt:'Sano'};
  if(s.margen>=tgt*0.6) return {cls:'warn',txt:'Ajustar'};
  return {cls:'bad',txt:'Corregir'};}
function barColor(s){const t=tgtOf(s); return s.margen>=t?'var(--green)':s.margen>=t*0.6?'var(--yellow)':'var(--red)';}

function renderResumen(data){
  const sv=data.costeo||[];
  const n=sv.length;
  const avgM=n?sv.reduce((a,s)=>a+s.margen,0)/n:0;
  const ajustar=sv.filter(s=>estado(s).cls!=='ok');
  const peor=[...sv].sort((a,b)=>a.margen-b.margen)[0];
  const el=document.getElementById('v-resumen');
  el.innerHTML=`
  <h2 class="section">Vista general</h2>
  <div class="kpis">
    <div class="kpi"><div class="k-label">Servicios costeados</div><div class="k-value">${n}</div><div class="k-sub">mano de obra + materiales</div></div>
    <div class="kpi"><div class="k-label">Insumos registrados</div><div class="k-value">${data.insumos.filter(i=>!i.section).length}</div><div class="k-sub">base de costos</div></div>
    <div class="kpi"><div class="k-label">Margen promedio</div><div class="k-value" style="color:${avgM>=50?'var(--green)':'var(--yellow)'}">${avgM.toFixed(0)}%</div><div class="k-sub">de los ${n} servicios</div></div>
    <div class="kpi"><div class="k-label">Para ajustar</div><div class="k-value" style="color:${ajustar.length?'var(--yellow)':'var(--green)'}">${ajustar.length}</div><div class="k-sub">bajo su margen objetivo</div></div>
  </div>
  ${peor?`<h2 class="section">Acción prioritaria</h2>
  <div class="card"><div class="card-head"><span class="name">${peor.name}</span><span class="badge ${estado(peor).cls}">${estado(peor).txt}</span></div>
    <div class="card-body">
      <div class="row"><span class="lbl">Margen actual</span><span class="val ${peor.margen>=tgtOf(peor)?'pos':'neg'}">${peor.margen.toFixed(0)}%</span></div>
      <div class="row"><span class="lbl">Margen objetivo</span><span class="val">${tgtOf(peor).toFixed(0)}%</span></div>
      <div class="row"><span class="lbl">Costo total</span><span class="val">${money(peor.costoTotal)}</span></div>
      <div class="row"><span class="lbl">Precio actual</span><span class="val acc">${money(peor.precio)}</span></div>
    </div></div>`:''}
  <h2 class="section">Ranking por margen</h2>
  <div class="cards">
    ${[...sv].sort((a,b)=>b.margen-a.margen).map(s=>{const e=estado(s);return`
    <div class="card"><div class="card-head"><span class="name">${s.name}</span><span class="badge ${e.cls}">${s.margen.toFixed(0)}%</span></div>
    <div class="card-body">
      <div class="row"><span class="lbl">Costo total</span><span class="val">${money(s.costoTotal)}</span></div>
      <div class="row"><span class="lbl">Precio</span><span class="val acc">${money(s.precio)}</span></div>
      <div class="bar"><i style="width:${Math.max(2,Math.min(100,s.margen))}%;background:${barColor(s)}"></i></div>
    </div></div>`}).join('')}
  </div>`;
}

function toggleMats(id){const d=document.getElementById('mats-'+id);if(d)d.style.display=d.style.display==='none'?'block':'none';}
function norm(s){return (s||'').toString().toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/\s+/g,' ').trim();}
const CAT_ORDER=['Interior','Pulido','Adicionales','Paquetes','Cer\u00e1mico'];
const CAT_LBL={Interior:'Interior \u00b7 Vestiduras',Pulido:'Pulido',Adicionales:'Adicionales / Extras',Paquetes:'Paquetes M\u00e1ximos',Cer\u00e1mico:'Cer\u00e1mico'};
function categoryOf(name){
  const n=norm(name);
  const sets={
    Interior:['vestiduras manteniemto','vestiduras avanzado'],
    Pulido:['pulido 3-1','correcion de pintura'],
    Adicionales:['lavado','faros','motor','cera + descontaminacion','lluvia acida'],
    Paquetes:['pulido + vestiduras + motor'],
    Ceramico:['ceramico mate 2 anos','1 paso + ceramico 1 ano','2 paso + ceramico 1 ano','1 paso + 3 anos','2 pasos + 3 anos','2 pasos + 5 anos','ceramico a piel','ceramico a plasticos','mantenimiento ceramico']
  };
  for(const k in sets){ if(sets[k].some(x=>norm(x)===n)) return k==='Ceramico'?'Cer\u00e1mico':k; }
  if(/ceramic/.test(n)) return 'Cer\u00e1mico';
  if(/correc/.test(n)) return 'Pulido';
  if(/pulido/.test(n)) return 'Pulido';
  if(/vestidura/.test(n)) return 'Interior';
  return 'Adicionales';
}
function mgColor(m,tgt){ if(m>=tgt)return 'var(--green)'; if(m>0)return 'var(--yellow)'; return 'var(--red)'; }
function renderRentab(data){
  const sv=data.costeo||[];
  const card=(s)=>{
    const tgt=tgtOf(s), e=estado(s);
    const meta=[s.cat,s.personas?s.personas+' pers':'',s.tiempo?s.tiempo+'h':''].filter(Boolean).join(' · ');
    return`
    <div class="card">
      <div class="card-head">
        <div><span class="badge cat" style="margin-bottom:6px;display:inline-block">${meta}</span>
          <div class="name">${s.name}</div></div>
        <span class="badge ${e.cls}">${e.txt}</span>
      </div>
      <div class="card-body">
        <div class="cost-row"><span class="cost-label">👷 Mano de obra</span><span style="font-weight:600">${money(s.costoMO)}</span></div>
        <div class="cost-row"><span class="cost-label">📦 Materiales (est)</span><span style="font-weight:600">${money(s.costoMat)}</span></div>
        <div class="row total"><span class="lbl">Costo total</span><span class="val">${money(s.costoTotal)}</span></div>
        <div class="sug" style="margin-top:10px">
          <div><div class="s-lbl">Precio actual</div><div class="s-val" style="color:var(--text)">${money(s.precio)}</div></div>
          <div style="text-align:right"><div class="s-lbl">Ganancia</div><div style="font-size:15px;font-weight:800;color:var(--green)">${money(s.precio-s.costoTotal)}</div></div>
        </div>
        <div class="bar"><i style="width:${Math.max(2,Math.min(100,s.margen))}%;background:${barColor(s)}"></i></div>
        <div class="mgline"><span style="color:${barColor(s)};font-weight:700">Margen: ${s.margen.toFixed(0)}%</span><span style="color:var(--muted)">Objetivo: ${tgt.toFixed(0)}%</span></div>
        ${s.notas?`<div class="cap" style="margin-top:8px">📝 ${s.notas}</div>`:''}
      </div>
    </div>`;};
  const el=document.getElementById('v-rentab');
  let html=`<div class="note">Costo real = mano de obra (2 técnicos $97.50/h ó 1 persona $37.50/h) + materiales estimados de tu BASE DE COSTOS. Precio = vehículo Mediano de tu pestaña de costeo.</div>`;
  const ORD=['Cerámico','Pulido','Interior','Paquetes','Adicionales'];
  for(const k of ORD){
    const grp=sv.filter(s=>catGroup(s.cat)===k);
    if(!grp.length)continue;
    html+=`<h2 class="section">${CAT_LBL[k]||k}</h2><div class="cards">${grp.map(card).join('')}</div>`;
  }
  el.innerHTML=html;
}

function renderPrecios(data){
  // agrupar por categoría de servicio
  const groups={}; CAT_ORDER.forEach(k=>groups[k]=[]);
  data.precios.forEach(p=>{ if(p.section)return; const c=categoryOf(p.name); (groups[c]=groups[c]||[]).push(p); });
  const cell=(lbl,val,hl)=>`<div class="vpc ${hl?'active':''}">
    <div class="vpc-lbl ${hl?'hl':''}">${lbl}${hl?' ★':''}</div>
    <div class="vpc-val ${hl?'hl':''}">${val||'—'}</div></div>`;
  document.getElementById('v-precios').innerHTML=CAT_ORDER.filter(k=>groups[k]&&groups[k].length).map(k=>`
    <h2 class="section">${CAT_LBL[k]||k}</h2>
    <div class="cards-sm">
      ${groups[k].map(p=>`<div class="card pcard">
        <div class="pcard-name">${p.name}</div>
        <div class="vpg">
          ${cell('Compacto',p.compacto)}${cell('Mediano',p.mediano,true)}${cell('SUV',p.suv)}${cell('3 Filas',p.filas)}
        </div></div>`).join('')}
    </div>`).join('');
}

function renderInsumos(data){
  const el=document.getElementById('v-insumos');
  el.innerHTML=`<h2 class="section">Base de costos · costo diluido por uso</h2>
  <div class="tbl-wrap"><table>
    <thead><tr><th>Producto</th><th class="num">Costo real</th><th class="num">Contenido</th><th class="num">Por litro/uso</th></tr></thead>
    <tbody>${data.insumos.map(i=>i.section
      ?`<tr class="sub"><td colspan="4">${i.section}</td></tr>`
      :`<tr><td>${i.name}${i.dur?` <span class="mini">· ${i.dur}</span>`:''}</td><td class="num">${money(i.costo)}</td><td class="num mini">${i.ml?i.ml.toLocaleString('en-US')+' ml':'—'}</td><td class="num acc">${money(i.costoDil)}</td></tr>`
    ).join('')}</tbody>
  </table></div>`;
}

function renderMargenes(data){
  const el=document.getElementById('v-margenes');
  el.innerHTML=`<h2 class="section">Márgenes objetivo por tipo de servicio</h2>
  <div class="tbl-wrap"><table>
    <thead><tr><th>Tipo de servicio</th><th class="num">Ideal</th><th class="num">Mínimo</th></tr></thead>
    <tbody>${data.margenes.map(m=>`<tr><td>${m.tipo}</td><td class="num pos">${m.ideal}</td><td class="num">${m.min}</td></tr>`).join('')}</tbody>
  </table></div>`;
}

function renderAll(data){
  renderResumen(data);renderRentab(data);renderPrecios(data);renderInsumos(data);renderMargenes(data);
}

/* ---------- orchestration ---------- */
function setStamp(state,when){
  const dot=document.getElementById('dot'),st=document.getElementById('stamp');
  dot.className='dot '+(state==='ok'?'ok':state==='err'?'err':'load');
  if(state==='load'){st.textContent='Sincronizando…';}
  else if(state==='err'){st.textContent='Sin conexión';}
  else{const d=new Date(when);st.textContent='Act. '+d.toLocaleString('es-MX',{day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit'});}
}
function showError(cached){
  document.getElementById('loading').style.display='none';
  if(cached){activate('resumen');return;}
  const m=document.getElementById('v-resumen');m.classList.add('active');
  m.innerHTML=`<div class="error">No se pudo leer la Google Sheet.<br><br>
    Verifica que esté compartida como <b>"Cualquier persona con el enlace · Lector"</b>.<br><br>
    <a href="${SHEET_URL}/edit" target="_blank">Abrir la hoja</a></div>`;
}
async function sync(){
  setStamp('load');
  document.getElementById('refresh').style.opacity='.5';
  try{
    const data=await loadAll();
    document.getElementById('loading').style.display='none';
    renderAll(data);
    const now=Date.now();
    localStorage.setItem(CACHE_KEY,JSON.stringify({data,when:now}));
    setStamp('ok',now);
    if(!document.querySelector('.view.active'))activate(initialTab());
  }catch(e){
    setStamp('err');
    const c=localStorage.getItem(CACHE_KEY);
    if(c){const{data,when}=JSON.parse(c);renderAll(data);
      document.getElementById('loading').style.display='none';
      document.querySelectorAll('.view').forEach(v=>{
        if(!v.querySelector('.note.cache')){const b=document.createElement('div');
          b.className='note cache';b.textContent='⚠ Mostrando últimos datos guardados ('+new Date(when).toLocaleString('es-MX')+'). Sin conexión a la hoja.';
          v.insertBefore(b,v.firstChild);}
      });
      showError(true);
    } else showError(false);
  }
  document.getElementById('refresh').style.opacity='1';
}
const TAB_IDS=['resumen','rentab','precios','insumos','margenes'];
function initialTab(){const h=(location.hash||'').replace('#','');return TAB_IDS.includes(h)?h:'resumen';}
function activate(v){
  if(location.hash.replace('#','')!==v) try{history.replaceState(null,'','#'+v);}catch(e){}
  document.querySelectorAll('nav button').forEach(b=>b.classList.toggle('active',b.dataset.v===v));
  document.querySelectorAll('.view').forEach(el=>el.classList.toggle('active',el.id==='v-'+v));
  window.scrollTo({top:0});
}
document.getElementById('nav').addEventListener('click',e=>{if(e.target.dataset.v)activate(e.target.dataset.v);});
document.getElementById('refresh').addEventListener('click',sync);

(function(){
  const c=localStorage.getItem(CACHE_KEY);
  if(c){try{const{data,when}=JSON.parse(c);renderAll(data);
    document.getElementById('loading').style.display='none';activate(initialTab());setStamp('ok',when);}catch(e){}}
  sync();
})();
</script>
</body>
</html>
